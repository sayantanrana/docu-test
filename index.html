<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>API Documentation</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f3f5f9;
      height: 100vh;
      display: flex;
    }

    /* LEFT SIDEBAR */

    .sidebar {
      width: 260px;
      background: linear-gradient(to bottom, #021b3a, #012148);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .sidebar-top {
      padding: 25px 20px;
    }

    .logo {
      font-size: 34px;
      margin-bottom: 10px;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 40px;
    }

    .menu-title {
      color: #9db3d1;
      font-size: 13px;
      margin: 25px 0 10px;
      letter-spacing: 1px;
    }

    .nav-link {
      display: block;
      color: white;
      text-decoration: none;
      padding: 14px 16px;
      margin-bottom: 10px;
      border-radius: 10px;
      transition: 0.3s;
      font-size: 17px;
    }

    .nav-link:hover {
      background: rgba(255,255,255,0.1);
    }

    .nav-link.active {
      background: #0d63ff;
    }

    .sidebar-footer {
      padding: 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
      color: #d7d7d7;
      font-size: 15px;
    }

    /* MAIN AREA */

    .main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */

    .header {
      height: 80px;
      background: white;
      display: flex;
      align-items: center;
      padding: 0 40px;
      border-bottom: 1px solid #ddd;
      font-size: 38px;
      font-weight: bold;
      color: #0b2450;
    }

    /* CONTENT */

    .content {
      padding: 35px;
      flex: 1;
    }

    .content-box {
      background: white;
      border-radius: 12px;
      padding: 40px;
      height: 100%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 8px;
    }

    /* FOOTER */

    .footer {
      text-align: center;
      padding: 18px;
      font-size: 14px;
      color: #666;
      background: white;
      border-top: 1px solid #ddd;
    }

  </style>
</head>

<body>

  <!-- SIDEBAR -->

  <div class="sidebar">

    <div class="sidebar-top">

      <div class="logo">📘</div>

      <div class="title">
        API Docs
      </div>

      <a href="home.html"
         target="contentFrame"
         class="nav-link active">
         🏠 Home
      </a>

      <div class="menu-title">
        APIS
      </div>

      <a href="API1.html" target="contentFrame" class="nav-link">📄 API1</a>

      <a href="API2.html" target="contentFrame" class="nav-link">📄 API2</a>

      <a href="API3.html" target="contentFrame" class="nav-link">📄 API3</a>

      <a href="API4.html" target="contentFrame" class="nav-link">📄 API4</a>

      <a href="API5.html" target="contentFrame" class="nav-link">📄 API5</a>

      <a href="API6.html" target="contentFrame" class="nav-link">📄 API6</a>

    </div>

    <div class="sidebar-footer">
      ℹ️ About This Docs
    </div>

  </div>

  <!-- MAIN SECTION -->

  <div class="main-container">

    <div class="header">
      API Documentation
    </div>

    <div class="content">

      <div class="content-box">

        <iframe
          name="contentFrame"

          srcdoc="
          <html>

          <body style='font-family: Arial; padding:20px;'>

            <h1 style='color:#0d63ff; margin-bottom:20px;'>
              Welcome
            </h1>

            <h2 style='margin-bottom:20px;'>
              Welcome to the API Documentation Portal.
            </h2>

            <p style='font-size:18px; line-height:1.8; margin-bottom:25px;'>

              This portal provides comprehensive documentation
              for all our APIs, including request and response
              formats, authentication details, error codes,
              and usage examples.

            </p>

            <p style='font-size:18px; margin-bottom:30px;'>

              Select an API from the left navigation menu
              to get started.

            </p>

            <div style='
              background:#eef4ff;
              padding:25px;
              border-radius:10px;
              font-size:18px;
              line-height:1.7;
            '>

              <b>💡 Tip</b><br><br>

              Use the navigation menu to explore
              different APIs and their documentation.

            </div>

          </body>

          </html>
          ">
        </iframe>

      </div>

    </div>

    <div class="footer">
      © 2026 API Documentation Portal. All Rights Reserved.
    </div>

  </div>

</body>
</html>
